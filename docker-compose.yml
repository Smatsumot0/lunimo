services:
  db:
    image: postgres:16
    container_name: lunimo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lunimo
    ports:
      - "5432:5432"
    volumes:
      - lunimo_pgdata:/var/lib/postgresql/data

volumes:
  lunimo_pgdata:

